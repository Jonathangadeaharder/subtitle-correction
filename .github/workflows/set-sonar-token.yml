name: Set SonarQube Token

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  set-token:
    runs-on: [self-hosted, maCOS, ARM64, VidiomTM]
    steps:
      - name: Set SONAR_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOKEN=$(cat /Users/jonathangadeaharder/.sonar_token)
          REPO=$(echo $GITHUB_REPOSITORY | cut -d/ -f2)
          gh secret set SONAR_TOKEN -R "$GITHUB_REPOSITORY" -b "$TOKEN"
          echo "Set SONAR_TOKEN for $GITHUB_REPOSITORY"
