name: Disable SonarCloud AA v2

on:
  workflow_dispatch:

jobs:
  disable-aa:
    runs-on: [self-hosted, macOS, ARM64, VidiomTM]
    steps:
      - name: Try multiple methods to disable AA
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "=== Method 1: settings/set ==="
          curl -sS -X POST "https://sonarcloud.io/api/settings/set?component=Jonathangadeaharder_subtitle-correction&keys=sonar.automaticAnalysis&values=false" \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            -w "\nHTTP_STATUS:%{http_code}\n"
          
          echo ""
          echo "=== Method 2: alm_settings/disable_auto_analysis with body ==="
          curl -sS -X POST "https://sonarcloud.io/api/alm_settings/disable_auto_analysis" \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "project=Jonathangadeaharder_subtitle-correction" \
            -w "\nHTTP_STATUS:%{http_code}\n"
          
          echo ""
          echo "=== Method 3: Check current AA status ==="
          curl -sS "https://sonarcloud.io/api/settings/values?component=Jonathangadeaharder_subtitle-correction&keys=sonar.automaticAnalysis" \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            -w "\nHTTP_STATUS:%{http_code}\n"
          
          echo ""
          echo "=== Method 4: alm_settings/disable_auto_analysis with project in query ==="
          curl -sS -X POST "https://sonarcloud.io/api/alm_settings/disable_auto_analysis?project=Jonathangadeaharder_subtitle-correction" \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            -w "\nHTTP_STATUS:%{http_code}\n"
