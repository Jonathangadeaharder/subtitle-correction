name: Fallow

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  fallow:
    runs-on: [self-hosted, macOS, ARM64, VidiomTM]
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: fallow-rs/fallow@9df2d1f754c482c458dadd5f113320f785c3ee44
        with:
          command: audit
          comment: true
          review-comments: true
        continue-on-error: true
