name: Disable SonarCloud AA v3

on:
  workflow_dispatch:

jobs:
  disable-aa:
    runs-on: [self-hosted, macOS, ARM64, VidiomTM]
    steps:
      - name: Disable AA via settings/set
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "=== Method 1: settings/set with key (singular) ==="
          curl -sS -X POST "https://sonarcloud.io/api/settings/set" \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            -d "component=Jonathangadeaharder_subtitle-correction" \
            -d "key=sonar.automaticAnalysis" \
            -d "value=false" \
            -w "\nHTTP_STATUS:%{http_code}\n"
          
          echo ""
          echo "=== Verify: check AA status ==="
          curl -sS "https://sonarcloud.io/api/settings/values?component=Jonathangadeaharder_subtitle-correction" \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            -w "\nHTTP_STATUS:%{http_code}\n" | grep -i "automatic" || echo "No automaticAnalysis setting found"
          
          echo ""
          echo "=== Method 2: Check project info ==="
          curl -sS "https://sonarcloud.io/api/components/show?component=Jonathangadeaharder_subtitle-correction" \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            -w "\nHTTP_STATUS:%{http_code}\n"
