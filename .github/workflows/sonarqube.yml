name: SonarQube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarqube:
    name: SonarQube
    runs-on: [self-hosted, maCOS, ARM64, VidiomTM]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read SonarQube token
        id: sonar-token
        run: echo "token=$(cat /Users/jonathangadeaharder/.sonar_token)" >> "$GITHUB_OUTPUT"
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ steps.sonar-token.outputs.token }}
          SONAR_HOST_URL: http://localhost:9001
      - name: Print failing quality gate conditions
        if: failure()
        run: |
          TOKEN=$(cat /Users/jonathangadeaharder/.sonar_token)
          BASE="http://localhost:9001"
          curl -sS --max-time 10 -u "$TOKEN:" \
            "$BASE/api/qualitygates/project_status?projectKey=VidiomTM_subtitle-correction" \
            | jq '.projectStatus.conditions[] | select(.status=="ERROR")' || true
